<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Services Section</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f8fafc;
  margin: 0;
}

/* SECTION */
.services {
  padding: 60px 20px;
  text-align: center;
}

.services h2 {
  font-size: 32px;
  margin-bottom: 40px;
  color: #1e3a8a;
}

/* CARDS */
.cards {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 25px;
}

.card {
  background: #fff;
  padding: 25px;
  border-radius: 16px;
  cursor: pointer;
  transition: 0.3s;
  box-shadow: 0 4px 20px rgba(0,0,0,0.08);
}

.card:hover {
  transform: translateY(-8px);
}

.card h3 {
  color: #1e3a8a;
}

/* POPUP */
.popup {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
  display: none;
  justify-content: center;
  align-items: center;
  padding: 20px;
}

.popup-content {
  background: #fff;
  width: 800px;
  max-width: 100%;
  border-radius: 20px;
  display: flex;
  overflow: hidden;
  position: relative;
}

/* LEFT IMAGE */
.popup-left {
  width: 40%;
}

.popup-left img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* RIGHT CONTENT */
.popup-right {
  width: 60%;
  padding: 25px;
  text-align: left;
}

.popup-right h2 {
  color: #1e3a8a;
}

.popup-right ul {
  padding-left: 18px;
}

/* CLOSE BTN */
.close-btn {
  position: absolute;
  top: 10px;
  right: 15px;
  font-size: 22px;
  cursor: pointer;
}

/* RESPONSIVE */
@media(max-width:768px){
  .popup-content {
    flex-direction: column;
  }

  .popup-left, .popup-right {
    width: 100%;
  }
}
</style>
</head>

<body>

<section class="services">
  <h2>Our Services</h2>

  <div class="cards">
    <div class="card" onclick="openPopup(0)">
      <h3>Drug Discovery</h3>
      <p>Innovative research solutions</p>
    </div>

    <div class="card" onclick="openPopup(1)">
      <h3>Clinical Research</h3>
      <p>End-to-end trial management</p>
    </div>

    <div class="card" onclick="openPopup(2)">
      <h3>Manufacturing</h3>
      <p>Scalable production solutions</p>
    </div>

    <div class="card" onclick="openPopup(3)">
      <h3>Analytical Testing</h3>
      <p>High-quality lab services</p>
    </div>

    <div class="card" onclick="openPopup(4)">
      <h3>Regulatory Consulting</h3>
      <p>Compliance & approvals</p>
    </div>
  </div>
</section>

<!-- POPUP -->
<div class="popup" id="popup">
  <div class="popup-content">
    <span class="close-btn" onclick="closePopup()">✖</span>

    <div class="popup-left">
      <img id="popup-img" src="">
    </div>

    <div class="popup-right">
      <h2 id="popup-title"></h2>
      <p id="popup-desc"></p>
      <ul id="popup-points"></ul>
    </div>
  </div>
</div>

<script>
const data = [
  {
    title: "Drug Discovery & Research",
    img: "https://images.unsplash.com/photo-1581091012184-5c8b1d5b2b1d",
    desc: "We provide end-to-end drug discovery solutions.",
    points: [
      "Target identification",
      "Biomarker discovery",
      "Preclinical studies",
      "Advanced research tools"
    ]
  },
  {
    title: "Clinical Research Services",
    img: "https://images.unsplash.com/photo-1580281657527-47d6e1f4c3c5",
    desc: "Supporting all phases of clinical trials.",
    points: [
      "Trial management",
      "Patient monitoring",
      "Data analysis",
      "Medical reporting"
    ]
  },
  {
    title: "Manufacturing (CDMO)",
    img: "https://images.unsplash.com/photo-1582719478170-1bdb3d7b0c61",
    desc: "Reliable pharmaceutical manufacturing.",
    points: [
      "API production",
      "Formulation",
      "Scale-up",
      "Packaging"
    ]
  },
  {
    title: "Analytical Testing",
    img: "https://images.unsplash.com/photo-1581594693702-fbdc51b2763b",
    desc: "Ensuring safety and quality standards.",
    points: [
      "Stability testing",
      "Bioanalysis",
      "Microbiology",
      "Quality assurance"
    ]
  },
  {
    title: "Regulatory Consulting",
    img: "https://images.unsplash.com/photo-1551836022-d5d88e9218df",
    desc: "Helping navigate regulatory frameworks.",
    points: [
      "FDA submissions",
      "Compliance",
      "Documentation",
      "Market strategy"
    ]
  }
];

function openPopup(index){
  document.getElementById("popup").style.display = "flex";
  document.getElementById("popup-title").innerText = data[index].title;
  document.getElementById("popup-desc").innerText = data[index].desc;
  document.getElementById("popup-img").src = data[index].img;

  let list = "";
  data[index].points.forEach(p => {
    list += `<li>${p}</li>`;
  });
  document.getElementById("popup-points").innerHTML = list;
}

function closePopup(){
  document.getElementById("popup").style.display = "none";
}
</script>

</body>
</html>
